name: Build release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        type: choice
        default: beta
        options:
          - beta
          - nightly
          - release
      tag:
        description: Optional release tag. Leave blank to generate one.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Check Python sources
        run: python -m compileall svcs

      - name: Build executable
        run: pyinstaller --onefile --name svcs --paths svcs svcs/main.py

      - name: Prepare release asset
        id: asset
        shell: bash
        run: |
          mkdir -p release

          ext=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            ext=".exe"
          fi

          platform="$(printf "%s-%s" "$RUNNER_OS" "$RUNNER_ARCH" | tr "[:upper:]" "[:lower:]")"
          asset_name="svcs-${platform}${ext}"

          cp "dist/svcs${ext}" "release/${asset_name}"
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.asset.outputs.asset_name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish ${{ inputs.channel }} release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          tag="${{ inputs.tag }}"

          if [ -z "$tag" ]; then
            tag="${{ inputs.channel }}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          fi

          prerelease="true"
          if [ "${{ inputs.channel }}" = "release" ]; then
            prerelease="false"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        shell: bash
        run: |
          args=(
            "$RELEASE_TAG"
            release-assets/*
            --title "SVCS ${RELEASE_TAG}"
            --notes "Automated ${{ inputs.channel }} build from ${GITHUB_SHA}."
            --target "$GITHUB_SHA"
          )

          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
