name: Build release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        type: choice
        default: beta
        options:
          - beta
          - nightly
          - release
      tag:
        description: Optional release tag. Leave blank to generate one.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64-glibc
            os: ubuntu-22.04
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Check Python sources
        run: python -m compileall svcs

      - name: Build executable
        run: pyinstaller --onefile --name svcs --paths svcs svcs/main.py

      - name: Smoke test executable on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          test -f dist/svcs
          chmod 755 dist/svcs
          test -x dist/svcs

          exe="$PWD/dist/svcs"
          smoke_dir="$(mktemp -d)"
          export SVCS_SMOKE_DIR="$smoke_dir"

          python -c "from pathlib import Path; import os, struct; root = Path(os.environ['SVCS_SMOKE_DIR']); svcs = root / '.svcs'; svcs.mkdir(parents=True, exist_ok=True); (svcs / 'core.svcs').write_bytes(struct.Struct('<32sIx').pack(b'ci-smoke', 1)); (svcs / 'commits.json').write_text('{}')"

          cd "$smoke_dir"
          "$exe" --list

      - name: Smoke test executable on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path -Path "dist\svcs.exe" -PathType Leaf)) {
            throw "dist\svcs.exe was not created"
          }

          $exe = (Resolve-Path -Path "dist\svcs.exe").Path
          $smokeDir = Join-Path $env:RUNNER_TEMP "svcs-smoke"
          New-Item -ItemType Directory -Force -Path $smokeDir | Out-Null
          $env:SVCS_SMOKE_DIR = $smokeDir

          python -c "from pathlib import Path; import os, struct; root = Path(os.environ['SVCS_SMOKE_DIR']); svcs = root / '.svcs'; svcs.mkdir(parents=True, exist_ok=True); (svcs / 'core.svcs').write_bytes(struct.Struct('<32sIx').pack(b'ci-smoke', 1)); (svcs / 'commits.json').write_text('{}')"

          Push-Location $smokeDir
          & $exe --list
          Pop-Location

      - name: Prepare release asset
        id: asset
        shell: bash
        run: |
          mkdir -p package/svcs release

          ext=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            ext=".exe"
          fi

          arch="$(printf "%s" "$RUNNER_ARCH" | tr "[:upper:]" "[:lower:]")"

          if [ "$RUNNER_OS" = "Linux" ]; then
            platform="linux-${arch}-glibc"
            asset_name="svcs-${platform}.tar.gz"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            platform="macos-${arch}"
            asset_name="svcs-${platform}.tar.gz"
          else
            platform="windows-${arch}"
            asset_name="svcs-${platform}.zip"
          fi

          cp "dist/svcs${ext}" "package/svcs/svcs${ext}"

          if [ "$RUNNER_OS" != "Windows" ]; then
            chmod 755 "package/svcs/svcs"
            tar -C package -czf "release/${asset_name}" svcs
          else
            cd package
            python -m zipfile -c "../release/${asset_name}" "svcs/svcs.exe"
            cd ..
          fi

          python -c "from pathlib import Path; import hashlib; p = Path('release/${asset_name}'); Path(str(p) + '.sha512').write_text(hashlib.sha512(p.read_bytes()).hexdigest() + '  ' + p.name + '\n')"

          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.asset.outputs.asset_name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish ${{ inputs.channel }} release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          tag="${{ inputs.tag }}"

          if [ -z "$tag" ]; then
            tag="${{ inputs.channel }}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          fi

          prerelease="true"
          if [ "${{ inputs.channel }}" = "release" ]; then
            prerelease="false"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        shell: bash
        run: |
          cat > release-notes.md <<NOTES
          Automated ${{ inputs.channel }} build from ${GITHUB_SHA}.

          Assets:
          - svcs-linux-x64-glibc.tar.gz: Linux x86_64 glibc build for Debian/Ubuntu, Fedora, Arch, and similar glibc distributions.
          - svcs-macos-*.tar.gz: macOS build for the GitHub runner architecture.
          - svcs-windows-*.zip: Windows build containing svcs.exe.

          The .tar.gz files preserve Unix executable permissions. The .sha512 files contain SHA-512 checksums.
          NOTES

          args=(
            "$RELEASE_TAG"
            release-assets/*
            --title "SVCS ${RELEASE_TAG}"
            --notes-file release-notes.md
            --target "$GITHUB_SHA"
          )

          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
